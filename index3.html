<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>

	<style>
		img{
			width: 100%;
			border-radius: 10px;
			box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
		}
		.producto{
			background: white;
			padding: 20px;
			border-radius: 10px;
			width: 200px;
			box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
		}
		.precio{
			color: green;
			font-size: 15px;
			margin: 10px 0px;
			font-weight: bold;
		}
		.container{
			display: flex;
			justify-content: center;
			gap: 20px;
			margin-top: 30px;
		}
		#gato{
			width: 50%;
			color: red;
			border-radius: 50%;
		}
		body{
			font-family: helvetica, sans-serif;
			background-color: #f4f4f4;
			text-align: center;
		}
		.gatito{
			background-image: linear-gradient(to right, #ff7e5f, #feb47b);
			font-family: consolas;
			color: darkred;
			padding: 5px 10px;
			border: none;
			border-radius: 5px;
			cursor: pointer;

		}
		h2{
			font-size: 15px;
		}
		p{
			font-size: 13px;
		}
	</style>
</head>
<body>
	<img id="gato" src="banner.webp">
	<br>
	<h1>Tienda de Camisetas</h1>
	<br>
	<div class="container">
		<div class="producto">
			<img src="recursos/camiseta-azul-cielo-oversize.webp" width="200px" alt="Camiseta 1">
			<h2>Camiseta Blanca</h2>
			<p>100% Algodón, cómoda y ligera</p>
			<p class= "precio">10€</p>
			<button class="gatito">Comprar</button>
		</div>
		<div class="producto">
			<img src="recursos/camiseta-recta-de-punto-lisa-azul.webp" width="200px" alt="Camiseta 2">
			<h2>Camiseta Azul</h2>
			<p>De punto y lisa</p>
			<p class= "precio">15€</p>
			<button class="gatito">Comprar</button>
		</div>
		<div class="producto">
			<img src="recursos/camiseta-deportiva.webp" width="100px" alt="Camiseta 3">
			<h2>Camiseta Deportiva</h2>
			<p>100% Algodón, deportiva</p>
			<p class= "precio">18€</p>
			<button class="gatito">Comprar</button>
		</div>
	</div>

</body>
</html>
